<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/estilos.css">
<script defer src="js/app.js"></script>
</head>
<body onload="verificarSesion()">
<header>
<h2>Panel de Control</h2>
<button onclick="logout()">Cerrar Sesión</button>
</header>
<section class="grid">
<div class="card">
<h3>Crear Ticket</h3>
<textarea id="descripcion" placeholder="Describe el problema"></textarea>
<select id="prioridad">
<option>Alta</option>
<option>Media</option>
<option>Baja</option>
</select>
<button onclick="crearTicket()">Guardar Ticket</button>
</div>
<div class="card">
<h3>Mis Tickets (<span id="contador">0</span>)</h3>
<ul id="listaTickets"></ul>
</div>
<div class="card" id="reportesCard" style="display:none;">
<h3>Reportes</h3>
<p>Total tickets: <span id="totalTickets"></span></p>
</div>
</section>
</body>
</html>
